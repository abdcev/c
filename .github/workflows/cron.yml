name: ATV Auto Link Updater

on:
  schedule:
    - cron: '0 * * * *' # Her saatin başında
  workflow_dispatch: # Manuel çalıştırma butonu sağlar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer & Chrome
        run: |
          npm install puppeteer
          npx puppeteer browsers install chrome

      - name: Run Fetch Script
        run: node fetch_atv.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add atv_link.txt
          git commit -m "Update ATV Link: $(date)" || echo "No changes to commit"
          git push
